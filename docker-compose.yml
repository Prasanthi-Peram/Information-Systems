services:
  db:
    image: timescale/timescaledb:2.14.2-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      TIMESCALEDB_PRELOAD: "true"

    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  mlflow:
    build: ./mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    environment:
      - BACKEND_STORE_URI=postgresql://postgres:${DB_PASS}@db:5432/${DB_NAME}
      - ARTIFACT_ROOT=/mlartifacts
    volumes:
      - ml_artifacts:/mlartifacts
    networks:
      - app-net
    command: >
      mlflow server 
      --backend-store-uri postgresql+psycopg2://postgres:${DB_PASS}@db:5432/${DB_NAME}
      --default-artifact-root /mlartifacts 
      --host 0.0.0.0
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "${API_PORT}:8000"
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      MLFLOW_TRACKING_URI: ${MLFLOW_TRACKING_URI}
    depends_on:
      db:
        condition: service_healthy
    networks:
      - app-net
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]

volumes:
  postgres_data:
  ml_artifacts:

networks:
  app-net:
    driver: bridge
