services:
  db:
    image: timescale/timescaledb:2.14.2-pg15
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${DB_PASS}
      - POSTGRES_DB=${DB_NAME}
      - TIMESCALEDB_PRELOAD="true"

    ports:
      - "${DB_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/migrations.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - app-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
  mlflow:
    build: ./mlflow
    ports:
      - "${MLFLOW_PORT}:5000"
    environment:
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - S3_BUCKET_NAME=s3://${S3_BUCKET_NAME}

      - GUNICORN_CMD_ARGS="--forwarded-allow-ips='*' --proxy-allow-from='*'"
    networks:
      - app-net
    command: >
      mlflow server 
      --backend-store-uri postgresql+psycopg2://postgres:${DB_PASS}@db:5432/${DB_NAME}
      --default-artifact-root s3://${S3_BUCKET_NAME} 
      --host 0.0.0.0
      --allowed-hosts "*"
    depends_on:
      db:
        condition: service_healthy

  api:
    build: ./api
    ports:
      - "${API_PORT}:8000"
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - S3_BUCKET_NAME=s3://${S3_BUCKET_NAME}
    depends_on:
      db:
        condition: service_healthy
      mlflow:
       condition: service_started
    networks:
      - app-net
    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]
  ml:
    build: ./ml
    restart: always
    environment:
      - DB_HOST=db
      - DB_USER=postgres
      - DB_PASS=${DB_PASS}
      - DB_NAME=${DB_NAME}
      - MLFLOW_TRACKING_URI=${MLFLOW_TRACKING_URI}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_DEFAULT_REGION=${AWS_DEFAULT_REGION}
      - S3_BUCKET_NAME=s3://${S3_BUCKET_NAME}
    volumes:
      - ./api:/app/api
    depends_on:
      db:
        condition: service_healthy
      mlflow:
       condition: service_started
    networks:
      - app-net
    command: ["tail", "-f", "/dev/null"]

volumes:
  postgres_data:

networks:
  app-net:
    driver: bridge
