
services:

  db:
    image: timescale/timescaledb:2.14.2-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
      TIMESCALEDB_PRELOAD: "true"

    ports:
      - "${DB_PORT}:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

    networks:
      - app-net

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5


  api:
    build: ./api

    ports:
      - "${API_PORT}:8000"

    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASSWORD: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      MLFLOW_TRACKING_URI: http://mlflow:5000

    depends_on:
      db:
        condition: service_healthy

    networks:
      - app-net

    command:
      [
        "uvicorn",
        "main:app",
        "--host",
        "0.0.0.0",
        "--port",
        "8000"
      ]


  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.9.2

    ports:
      - "5000:5000"

    volumes:
      - mlflow_data:/mlflow
      - mlflow_artifacts:/mlflow/artifacts

    environment:
      MLFLOW_BACKEND_STORE_URI: "sqlite:////mlflow/mlflow.db"
      MLFLOW_DEFAULT_ARTIFACT_ROOT: "/mlflow/artifacts"

    command: >
      mlflow server
      --host 0.0.0.0
      --port 5000
      --backend-store-uri sqlite:////mlflow/mlflow.db
      --default-artifact-root /mlflow/artifacts

    networks:
      - app-net


volumes:
  postgres_data:
  mlflow_data:
  mlflow_artifacts:


networks:
  app-net:
    driver: bridge